<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mario's Pizza</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Georgia, serif;
      background-color: #fff8f0;
      color: #2c2c2c;
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      background-color: #c0392b;
      color: white;
      padding: 24px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    header .logo {
      font-size: 56px;
      display: block;
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 32px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 6px;
    }

    /* ── Section headers ── */
    h2 {
      font-size: 20px;
      color: #c0392b;
      border-bottom: 2px solid #c0392b;
      padding-bottom: 6px;
      margin: 24px 0 12px;
    }

    /* ── Menu items ── */
    .menu-item {
      display: flex;
      align-items: flex-start;
      padding: 12px 8px;
      border-bottom: 1px solid #f0e0d0;
      cursor: pointer;
      border-radius: 6px;
      transition: background-color 0.15s;
    }

    .menu-item:hover {
      background-color: #fdecea;
    }

    .menu-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-right: 14px;
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: #c0392b;
      cursor: pointer;
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-weight: bold;
      font-size: 16px;
    }

    .item-desc {
      font-size: 13px;
      color: #777;
      margin-top: 2px;
    }

    .item-price {
      font-weight: bold;
      color: #c0392b;
      white-space: nowrap;
      margin-left: 12px;
      font-size: 16px;
    }

    /* ── Order section ── */
    #order-section {
      background-color: #fff;
      border: 2px solid #c0392b;
      border-radius: 12px;
      padding: 18px;
      margin-top: 32px;
    }

    #order-section h2 {
      border-color: #c0392b;
      margin-top: 0;
    }

    #order-list {
      min-height: 40px;
      margin-bottom: 12px;
    }

    .order-line {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0e0d0;
      font-size: 15px;
    }

    .empty-msg {
      color: #aaa;
      font-style: italic;
      font-size: 14px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: bold;
      padding-top: 10px;
      margin-top: 6px;
      border-top: 2px solid #c0392b;
    }

    /* ── Buttons ── */
    .big-btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 14px;
      transition: opacity 0.2s;
    }

    .big-btn:hover {
      opacity: 0.88;
    }

    #generate-btn {
      background-color: #27ae60;
      color: white;
    }

    #copy-btn {
      background-color: #2980b9;
      color: white;
      display: none;
    }

    #clear-btn {
      background-color: #95a5a6;
      color: white;
    }

    /* ── Text output ── */
    #text-order {
      display: none;
      width: 100%;
      font-size: 15px;
      font-family: monospace;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 12px;
      resize: vertical;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-top: 40px;
      padding-bottom: 20px;
    }

    /* ── Loading state ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: #c0392b;
      font-size: 18px;
    }

    .error {
      text-align: center;
      padding: 40px;
      color: #e74c3c;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <header>
    <span class="logo" id="header-logo">🍕</span>
    <h1 id="header-name">Mario's Pizza</h1>
    <p id="header-tagline">Loading...</p>
  </header>

  <div id="menu-container">
    <p class="loading">Loading menu...</p>
  </div>

  <!-- ORDER SECTION -->
  <div id="order-section">
    <h2>🛒 Your Order</h2>
    <div id="order-list">
      <p class="empty-msg">Select items above to build your order.</p>
    </div>
    <div class="total-row">
      <span>Total</span>
      <span id="total">$0.00</span>
    </div>

    <button class="big-btn" id="generate-btn" onclick="generateTextOrder()">
      📱 Create My Text Order
    </button>
    <textarea id="text-order" rows="10"></textarea>
    <button class="big-btn" id="copy-btn" onclick="copyOrder()">
      Copy to Clipboard
    </button>
    <button class="big-btn" id="clear-btn" onclick="clearOrder()">
      Clear Order
    </button>
  </div>

  <footer id="footer">
    Loading...
  </footer>

  <script>
    const STORAGE_KEY = 'marios_pizza_data';
    const DATA_URL = 'data.json';
    let menuData = null;

    async function loadData() {
      const cached = localStorage.getItem(STORAGE_KEY);
      if (cached) {
        try {
          menuData = JSON.parse(cached);
          renderPage();
          fetchAndCache();
          return;
        } catch (e) {
          localStorage.removeItem(STORAGE_KEY);
        }
      }
      await fetchAndCache();
    }

    async function fetchAndCache() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error('Failed to load menu data');
        menuData = await response.json();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(menuData));
        renderPage();
      } catch (error) {
        if (!menuData) {
          document.getElementById('menu-container').innerHTML =
            '<p class="error">Unable to load menu. Please refresh the page.</p>';
        }
        console.error('Error loading data:', error);
      }
    }

    function renderPage() {
      const { restaurant, categories } = menuData;

      document.getElementById('header-logo').textContent = restaurant.logo;
      document.getElementById('header-name').textContent = restaurant.name;
      document.getElementById('header-tagline').textContent =
        `${restaurant.tagline} · Call us at ${restaurant.phone}`;

      const footerParts = [restaurant.name, restaurant.address, restaurant.phone];
      if (restaurant.hours) footerParts.push(restaurant.hours);
      document.getElementById('footer').textContent = footerParts.join(' · ');

      const container = document.getElementById('menu-container');
      container.innerHTML = '';

      categories.forEach(category => {
        const header = document.createElement('h2');
        header.textContent = category.icon ? `${category.icon} ${category.name}` : category.name;
        container.appendChild(header);

        category.items.forEach(item => {
          const label = document.createElement('label');
          label.className = 'menu-item';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.dataset.name = item.name;
          checkbox.dataset.price = item.price;
          checkbox.addEventListener('change', updateOrder);

          const info = document.createElement('div');
          info.className = 'item-info';

          const nameDiv = document.createElement('div');
          nameDiv.className = 'item-name';
          nameDiv.textContent = item.displayName || item.name;
          info.appendChild(nameDiv);

          if (item.description) {
            const descDiv = document.createElement('div');
            descDiv.className = 'item-desc';
            descDiv.textContent = item.description;
            info.appendChild(descDiv);
          }

          const priceSpan = document.createElement('span');
          priceSpan.className = 'item-price';
          priceSpan.textContent = `$${item.price.toFixed(2)}`;

          label.appendChild(checkbox);
          label.appendChild(info);
          label.appendChild(priceSpan);
          container.appendChild(label);
        });
      });
    }

    function updateOrder() {
      var checked = document.querySelectorAll('input[type="checkbox"]:checked');
      var orderList = document.getElementById("order-list");
      var totalDisplay = document.getElementById("total");
      var total = 0;
      var html = "";

      if (checked.length === 0) {
        html = '<p class="empty-msg">Select items above to build your order.</p>';
      } else {
        checked.forEach(function(box) {
          var name = box.dataset.name;
          var price = parseFloat(box.dataset.price);
          total += price;
          html += `<div class="order-line"><span>${name}</span><span>$${price.toFixed(2)}</span></div>`;
        });
      }

      orderList.innerHTML = html;
      totalDisplay.textContent = "$" + total.toFixed(2);

      document.getElementById("text-order").style.display = "none";
      document.getElementById("copy-btn").style.display = "none";
      document.getElementById("copy-btn").textContent = "Copy to Clipboard";
    }

    function generateTextOrder() {
      var checked = document.querySelectorAll('input[type="checkbox"]:checked');

      if (checked.length === 0) {
        alert("Please select some items first!");
        return;
      }

      var total = 0;
      var lines = [menuData.restaurant.orderGreeting, ""];

      checked.forEach(function(box) {
        var name = box.dataset.name;
        var price = parseFloat(box.dataset.price);
        total += price;
        lines.push(`• ${name} ($${price.toFixed(2)})`);
      });

      lines.push("");
      lines.push(`Order Total: $${total.toFixed(2)}`);
      lines.push(menuData.restaurant.orderThanks);

      var textArea = document.getElementById("text-order");
      textArea.value = lines.join("\n");
      textArea.style.display = "block";
      document.getElementById("copy-btn").style.display = "block";
      textArea.scrollIntoView({ behavior: "smooth" });
    }

    function copyOrder() {
      var textArea = document.getElementById("text-order");
      var copyBtn = document.getElementById("copy-btn");

      textArea.select();
      if (navigator.clipboard) {
        navigator.clipboard.writeText(textArea.value).then(function() {
          copyBtn.textContent = "✓ Copied! Paste it into your texts.";
          setTimeout(function() {
            copyBtn.textContent = "Copy to Clipboard";
          }, 3000);
        });
      } else {
        document.execCommand("copy");
        copyBtn.textContent = "✓ Copied!";
        setTimeout(function() { copyBtn.textContent = "Copy to Clipboard"; }, 3000);
      }
    }

    function clearOrder() {
      document.querySelectorAll('input[type="checkbox"]').forEach(function(box) {
        box.checked = false;
      });
      updateOrder();
    }

    loadData();
  </script>

</body>
</html>
