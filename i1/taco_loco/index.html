<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taco Loco</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <span class="logo" id="header-logo">🌮</span>
    <h1 id="header-name">Taco Loco</h1>
    <p class="tagline" id="header-tagline">Loading...</p>
  </header>

  <div id="menu-container">
    <p class="loading">Loading menu...</p>
  </div>

  <div id="order-section">
    <h2>🛒 Your Order</h2>
    <div id="order-list">
      <p class="empty-msg">Tap items above to start your order!</p>
    </div>
    <div class="total-row">
      <span>Total</span>
      <span id="total">$0.00</span>
    </div>

    <button class="big-btn" id="generate-btn" onclick="generateTextOrder()">
      📱 Create My Text Order
    </button>
    <textarea id="text-order" rows="11"></textarea>
    <button class="big-btn" id="copy-btn" onclick="copyOrder()">
      Copy to Clipboard
    </button>
    <button class="big-btn" id="clear-btn" onclick="clearOrder()">
      Clear Order
    </button>
  </div>

  <footer id="footer">
    Loading...
  </footer>

  <script src="app.js"></script>
</body>
</html>
